<head>
	<style type="text/css">
		*{
			margin:0;
			padding: 0;
		}
		header{
			width: 100%;
			text-align: center;
			background-color: lightgreen;
			line-height: 70px;
		}
		section{
			width: 100%; 
			text-align: center;
			background-color: lightgray; 
			line-height: 500px;
		}
		footer{
			width: 100%; 
			text-align: center;
			background-color: lightblue; 
			line-height: 70px;
		}
		nav{
			background-color: #333;
			text-align: center;
		}
		nav ul li{
			display: inline;
			line-height: 40px;
		}
		 nav ul li a{
		 	text-decoration: none;
		 	color: white;
		 	padding-left: 20px;
		 	padding-bottom: 20px;
		 }
		 nav ul li a:hover{
		 	text-decoration: underline;
		 }
	</style>
		
</head>
<body>
	<header>HEADER</header>
	<nav>
		<ul>
			<li><a href="#">Lien 1</a></li>
			<li><a href="#">Lien 2</a></li>
			<li><a href="#">Lien 3</a></li>
			<li><a href="#">Lien 4</a></li>
			<li><a href="#">Lien 5</a></li>
		</ul>
	</nav>
	<section>SECTION</section>
	<footer>FOOTER</footer>
</body>
