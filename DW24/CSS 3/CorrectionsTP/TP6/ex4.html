<head>
	<style type="text/css">
		*{
			margin:0;
			padding: 0;
		}
		header{
			width: 100%;
			text-align: center;
			background-color: lightgreen;
			line-height: 70px;
		}
		section{
			width: 80%; 
			text-align: center;
			background-color: lightgray; 
			line-height: 500px;
		}
		footer{
			width: 100%; 
			text-align: center;
			background-color: lightblue; 
			line-height: 70px;
		}
		nav{
			background-color: #333;
			text-align: center;
		}
		nav ul li{
			display: inline;
			line-height: 40px;
		}
		 nav ul li a{
		 	text-decoration: none;
		 	color: white;
		 	padding-left: 20px;
		 	padding-bottom: 20px;
		 }
		 nav ul li a:hover{
		 	text-decoration: underline;
		 }
		aside{
			background-color: pink;
			height: 300px;
			width: 20%;
			text-align: center;
		}
		main{
			display: flex;
		}
		article{
			background-color: #333;
			opacity: .75;
			text-align: center;
			border: 1px solid black;
			border-radius: 5px;
			width: 80%;
			line-height: 120px;
			box-shadow: 5px 5px 20px gray;
 			margin: auto;
 			margin-top: 20px;
			margin-bottom: 20px;
		}
		.art34{
			width: 35%;
			margin-right: 50px;
		}
		section div{
			display: flex;
			
		}
	</style>
		
</head>
<body>
	<header>HEADER</header>
	<nav>
		<ul>
			<li><a href="#">Lien 1</a></li>
			<li><a href="#">Lien 2</a></li>
			<li><a href="#">Lien 3</a></li>
			<li><a href="#">Lien 4</a></li>
			<li><a href="#">Lien 5</a></li>
		</ul>
	</nav>
	<main>
		<aside>ASIDE</aside>
		<section>
			<article>ARTICLE 1</article>
			<article>ARTICLE 2</article>
			<div>
				<article class="art34">ARTICLE 3</article>
				<article class="art34">ARTICLE 4</article>
			</div>
		</section>
	</main>
	<footer>FOOTER</footer>
</body>
