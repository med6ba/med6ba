<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seven Sec | À propos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/7S.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .content .grid{
            display: grid;
            grid-template-columns: repeat(3, 2fr);
            gap: 45px;
        }
        .card{
            width: 320px;
            height: auto;
            color: aliceblue;
            background-color: #566378;
            border: 3px solid #1b1e23;
            border-radius: 10px;
            padding: 20px;
            transition: 0.2s;
        }
        .card:hover{
            transform: scale(0.98);
            transition: 0.2s;
        }
        h2{
            font-family: p2;
            font-size: 30px;
            padding: 5px 5px;
        }
        a{
            text-decoration: none;
        }
        .content .grid a i{
            font-size: 40px;
            color: #1b1e23;
            padding: 5px 5px;
        }
    </style>
</head>
<body>
    <main class="header">
        <nav class="navbar">
            <a href="index.html"><img src="images/logo.png" alt="logo"></a>
            <ul class="menu">
                <li><a href="index.html"><i class="fa-solid fa-home"><span> Accueil</span></i></a></li>
                <li><a href="contact.html"><i class="fa-solid fa-comment"><span> Contact</span></i></a></li>
            </ul>
        </nav>
        <section class="content">
            <div class="grid">
                <a href="entreprises.html">
                    <div class="card">
                        <h2><i class="fa-solid fa-building"></i><br> Entreprises</h2>
                    </div>
                </a>
                <a href="presentation.html">
                    <div class="card">
                        <h2><i class="fa-solid fa-person-chalkboard"></i><br> Présentation</h2>
                    </div>
                </a>
                <a href="services.html">
                    <div class="card">
                        <h2><i class="fa-solid fa-cart-shopping"></i><br> Services</h2>
                    </div>
                </a>
                <a href="tarifs.html">
                    <div class="card">
                        <h2><i class="fa-solid fa-sack-dollar"></i><br> Tarifs</h2>
                    </div>
                </a>
                <a href="gallery.html">
                    <div class="card">
                        <h2><i class="fa-solid fa-images"></i><br> Gallery</h2>
                    </div>
                </a>
                <a href="clients.html">
                    <div class="card">
                        <h2><i class="fa-solid fa-users"></i><br> Clients</h2>
                    </div>
                </a>
            </div>
        </section>
    </main>
</body>
</html>
