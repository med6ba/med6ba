<head>
	<meta charset="utf-8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" type="text/css" href="css/styles2.css">
</head>
<body>
	<div class="avatar"><img src="images/avatar.png"></div>
	<div class="avatar2"><img src="images/avatar.png"></div>
	<header>
		<h1><i class="fa-regular fa-calendar"></i> GESTION DES PRISES DES RENDEZ-VOUS</h1> 
	</header>
	<main>
		<aside>
			<ul>
				<li><a href=#><i class="fa-solid fa-circle-plus"></i></i> Ajouter</a>
				<li><a href=#><i class="fa-solid fa-pen-to-square"></i> Modifier</a>
				<li><a href=#><i class="fa-solid fa-pen-to-square"></i> Supprimer</a>
				<li><a href=#><i class="fa-solid fa-print"></i> Imprimer</a>
			</ul>
		</aside>
		<section>
			<div class="conteneur">
			<form method="POST">
				<h1>Prise de rendez-vous</h1>
				<br><label>Nom et prénom</label><br>
				<input type="text" placeholder="Entre votre nom et prénom">
				<br><label>Objet</label><br>
				<select>
					<option>Consultation</option>
					<option>Visite Médicale</option>
					<option>Visite Amicale</option>
				</select>
				<br><label>Date du rende-vous</label><br>
				<input type="date">
				<br><label>Heure du rendez-vous</label><br>
				<input type="time" name=""><br>
				<input type="submit" Value="Envoyer">
			</form>
			</div>
		</section>
	</main>
</body>
